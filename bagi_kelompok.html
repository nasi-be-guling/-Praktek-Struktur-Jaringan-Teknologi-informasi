<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembagi Kelompok Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6 text-slate-800">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-700 mb-2"><i class="fas fa-users-cog"></i> Generator Kelompok Otomatis</h1>
            <p class="text-slate-500">Membagi mahasiswa ke dalam kelompok (Maks 4, Min 3 orang) secara presisi tanpa lintas kelas.</p>
        </div>

        <!-- Input Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-lg font-semibold mb-4 text-slate-700 border-b pb-2"><i class="fas fa-file-csv text-emerald-500 mr-2"></i>Upload Data Kelas (CSV)</h2>
            
            <div id="errorMsg" class="hidden mb-4 p-4 bg-red-50 text-red-700 border border-red-200 rounded-lg text-sm font-medium flex items-center">
                <i class="fas fa-exclamation-circle mr-2 text-lg"></i> <span id="errorText"></span>
            </div>

            <div class="flex flex-col md:flex-row gap-6 items-start md:items-center">
                <div class="flex-grow w-full">
                    <input type="file" id="fileInput" multiple accept=".csv" class="block w-full text-sm text-slate-500
                      file:mr-4 file:py-2.5 file:px-4
                      file:rounded-lg file:border-0
                      file:text-sm file:font-semibold
                      file:bg-indigo-50 file:text-indigo-700
                      hover:file:bg-indigo-100 cursor-pointer transition-colors
                    "/>
                    <p class="text-xs text-slate-400 mt-2">Anda dapat memilih 4 file CSV sekaligus.</p>
                </div>
                
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <label class="flex items-center gap-2 cursor-pointer bg-slate-50 py-2 px-4 rounded-lg border border-slate-200">
                        <input type="checkbox" id="shuffleCheck" class="w-4 h-4 text-indigo-600 rounded" checked>
                        <span class="text-sm font-medium text-slate-700">Acak Anggota</span>
                    </label>
                    <button id="processBtn" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-6 rounded-lg transition-colors whitespace-nowrap shadow-sm">
                        <i class="fas fa-magic mr-2"></i> Bagi Kelompok
                    </button>
                </div>
            </div>
        </div>

        <!-- Output Section -->
        <div id="outputArea" class="hidden transition-all duration-500">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold text-slate-700"><i class="fas fa-clipboard-list text-indigo-500 mr-2"></i>Hasil Pembagian</h2>
                <button id="copyBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-2 px-5 rounded-lg transition-colors text-sm shadow-sm flex items-center">
                    <i class="fas fa-copy mr-2"></i> Salin ke Clipboard (Teks)
                </button>
            </div>
            
            <!-- Cards Container -->
            <div id="resultsContainer" class="space-y-8"></div>
        </div>
    </div>

    <script>
        document.getElementById('processBtn').addEventListener('click', processFiles);

        async function processFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            
            if (files.length === 0) {
                showError("Silakan pilih minimal 1 file CSV kelas terlebih dahulu.");
                return;
            }

            hideError();
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '';
            const isShuffle = document.getElementById('shuffleCheck').checked;

            let allResultsText = "";
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                try {
                    const text = await readFileAsync(file);
                    // Clean filename for class name display
                    let className = file.name.replace('.csv', '').replace('.xlsx - Sheet1', '').replace('DATA MAHASISWA', 'Kelas').trim();
                    
                    const students = parseCSV(text);
                    if (students.length === 0) {
                        console.warn(`File ${file.name} tidak memiliki format NIM/NAMA yang sesuai.`);
                        continue; 
                    }

                    successCount++;

                    if (isShuffle) {
                        shuffleArray(students);
                    }

                    const groups = createGroups(students, className);
                    renderClassGroups(className, groups, resultsContainer);
                    allResultsText += generateText(className, groups);
                    
                } catch (e) {
                    console.error("Gagal membaca file:", file.name, e);
                }
            }

            if (successCount === 0) {
                showError("Gagal membaca data dari file. Pastikan file CSV memiliki kolom 'NIM' dan 'NAMA'.");
                return;
            }

            document.getElementById('outputArea').classList.remove('hidden');
            window.generatedText = allResultsText;
        }

        // CSV Parser Logic
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            let headerIdx = -1;
            
            // Find the header row dynamically
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].toUpperCase().includes("NIM")) {
                    headerIdx = i;
                    break;
                }
            }
            if (headerIdx === -1) return [];

            const headers = lines[headerIdx].split(',').map(h => h.trim().toUpperCase());
            let nimIdx = headers.findIndex(h => h.includes("NIM"));
            let namaIdx = headers.findIndex(h => h.includes("NAMA"));

            if (nimIdx === -1 || namaIdx === -1) return [];

            let students = [];
            for (let i = headerIdx + 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // Simple CSV split taking quotes into account
                const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (row.length > Math.max(nimIdx, namaIdx)) {
                    let nim = row[nimIdx].trim().replace(/^"|"$/g, '');
                    let nama = row[namaIdx].trim().replace(/^"|"$/g, '');
                    
                    if (nim && nama && nim.toUpperCase() !== 'NIM') {
                        students.push({ nim, nama });
                    }
                }
            }
            return students;
        }

        // Core Mathematical Algorithm: Min 3, Max 4
        function createGroups(students, className) {
            const n = students.length;
            let groupsOf4 = Math.floor(n / 4);
            let remainder = n % 4;
            let groupsOf3 = 0;

            // Adjust distribution to satisfy constraints
            if (remainder === 3) {
                groupsOf3 = 1;
            } else if (remainder === 2) {
                if (groupsOf4 >= 1) {
                    groupsOf4 -= 1;
                    groupsOf3 = 2;
                } else {
                    groupsOf3 = 1; // Fallback if n=2 (Very small class)
                }
            } else if (remainder === 1) {
                if (groupsOf4 >= 2) {
                    groupsOf4 -= 2;
                    groupsOf3 = 3;
                } else {
                    groupsOf3 = 1; // Fallback if n=1 or 5
                }
            }

            let groups = [];
            let idx = 0;
            let groupNumber = 1;

            for (let i = 0; i < groupsOf4; i++) {
                groups.push({
                    groupName: `Kelompok ${groupNumber}`,
                    members: students.slice(idx, idx + 4)
                });
                idx += 4;
                groupNumber++;
            }
            
            for (let i = 0; i < groupsOf3; i++) {
                groups.push({
                    groupName: `Kelompok ${groupNumber}`,
                    members: students.slice(idx, idx + 3)
                });
                idx += 3;
                groupNumber++;
            }
            
            // Catch any remaining if class size was mathematically impossible (e.g. n=5)
            if (idx < n) {
                groups.push({
                    groupName: `Kelompok ${groupNumber}`,
                    members: students.slice(idx, n)
                });
            }

            return groups;
        }

        // UI Rendering
        function renderClassGroups(className, groups, container) {
            const classSection = document.createElement('div');
            classSection.className = 'bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8';
            
            const classHeader = document.createElement('div');
            classHeader.className = 'flex justify-between items-center mb-6 pb-3 border-b border-slate-100';
            
            const classTitle = document.createElement('h3');
            classTitle.className = 'text-xl font-bold text-indigo-800';
            classTitle.innerHTML = `<i class="fas fa-chalkboard-user mr-2 text-indigo-500"></i> ${className}`;
            
            const groupCount = document.createElement('span');
            groupCount.className = 'bg-indigo-50 text-indigo-600 text-xs font-bold px-3 py-1 rounded-full';
            groupCount.textContent = `${groups.length} Kelompok`;
            
            classHeader.appendChild(classTitle);
            classHeader.appendChild(groupCount);
            classSection.appendChild(classHeader);

            const groupsGrid = document.createElement('div');
            groupsGrid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5';

            groups.forEach(g => {
                const gCard = document.createElement('div');
                gCard.className = 'bg-slate-50 p-4 rounded-xl border border-slate-200 hover:shadow-md transition-shadow';
                
                const gTitle = document.createElement('div');
                gTitle.className = 'flex justify-between items-center mb-3';
                gTitle.innerHTML = `
                    <h4 class="font-bold text-slate-700">${g.groupName}</h4>
                    <span class="text-xs font-semibold bg-slate-200 text-slate-600 px-2 py-0.5 rounded">${g.members.length} Org</span>
                `;
                gCard.appendChild(gTitle);

                const ul = document.createElement('ul');
                ul.className = 'space-y-2';
                g.members.forEach(m => {
                    const li = document.createElement('li');
                    li.className = 'flex flex-col bg-white p-2 rounded border border-slate-100';
                    li.innerHTML = `
                        <span class="font-semibold text-sm text-slate-800 truncate" title="${m.nama}">${m.nama}</span>
                        <span class="font-mono text-xs text-slate-500">${m.nim}</span>
                    `;
                    ul.appendChild(li);
                });
                gCard.appendChild(ul);
                groupsGrid.appendChild(gCard);
            });

            classSection.appendChild(groupsGrid);
            container.appendChild(classSection);
        }

        // Utils
        function readFileAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = e => reject(e);
                reader.readAsText(file);
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById('errorMsg');
            document.getElementById('errorText').textContent = msg;
            errDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
        }

        function generateText(className, groups) {
            let txt = `=======================================\n${className.toUpperCase()}\n=======================================\n\n`;
            groups.forEach(g => {
                txt += `[ ${g.groupName.toUpperCase()} ]\n`;
                g.members.forEach((m, idx) => {
                    txt += `  ${idx+1}. ${m.nim} - ${m.nama}\n`;
                });
                txt += `\n`;
            });
            return txt + `\n`;
        }

        // Copy functionality
        document.getElementById('copyBtn').addEventListener('click', () => {
            if(window.generatedText) {
                // Use alternative method for execCommand to bypass some restrictions
                const textarea = document.createElement('textarea');
                textarea.value = window.generatedText;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                const btn = document.getElementById('copyBtn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check mr-2"></i> Berhasil Disalin!';
                btn.classList.replace('bg-emerald-500', 'bg-slate-600');
                btn.classList.replace('hover:bg-emerald-600', 'hover:bg-slate-700');
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('bg-slate-600', 'bg-emerald-500');
                    btn.classList.replace('hover:bg-slate-700', 'hover:bg-emerald-600');
                }, 2000);
            }
        });
    </script>
</body>
</html>
